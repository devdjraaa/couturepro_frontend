name: Deploy Gextimo Frontend

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'android/**'
      - 'scripts/**'
      - 'assets/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # known_hosts best-effort : ne doit pas faire échouer le step (ssh/rsync utilisent StrictHostKeyChecking=no)
          ssh-keyscan -T 10 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy Nginx
        timeout-minutes: 4
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o ConnectionAttempts=5 \
              -o ConnectTimeout=45 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              -o BatchMode=yes \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENGNX'

          CONF_SRC_TMP=$(mktemp)
          CONF_DEST=/etc/nginx/sites-available/gextimo_frontend.conf
          CONF_LINK=/etc/nginx/sites-enabled/gextimo_frontend.conf
          DOMAIN=gextimo.novafriq.africa

          cat > "$CONF_SRC_TMP" << 'NGINXCONF'
          server {
              listen 80;
              server_name gextimo.novafriq.africa;
              root /var/www/gextimo_frontend;
              index index.html;
              client_max_body_size 20M;
              location / { try_files $uri $uri/ /index.html; }
              # Assets hashés par Vite (/assets/) : réellement immuables → cache très long.
              location ^~ /assets/ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
                  access_log off;
              }
              # Service worker : jamais figé (doit pouvoir se mettre à jour).
              location = /sw.js { add_header Cache-Control "no-cache"; }
              # Statiques à URL STABLE dont le contenu change (favicon, icônes, manifest) :
              # cache court + revalidation. En « immutable » 1 an, un changement de logo
              # n'atteignait jamais les navigateurs (constaté le 19/07 : Edge et Chrome
              # affichaient deux anciens favicons différents, insensibles au rafraîchissement).
              location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|webmanifest)$ {
                  expires 1h;
                  add_header Cache-Control "public, max-age=3600, must-revalidate";
                  access_log off;
              }
              # Polices : longue durée acceptable.
              location ~* \.(woff|woff2|ttf|eot)$ {
                  expires 30d;
                  add_header Cache-Control "public";
                  access_log off;
              }
              location ~ /\.(?!well-known).* { deny all; }
              error_log  /var/log/nginx/gextimo_frontend_error.log;
              access_log /var/log/nginx/gextimo_frontend_access.log;
          }
          NGINXCONF

          # Le fichier en place est ENRICHI par certbot (bloc 443, chemins des
          # certificats). Le comparer au gabarit brut le déclare donc toujours
          # différent, et il était réécrit à CHAQUE déploiement — perdant le
          # HTTPS à chaque fois. D'où un marqueur de version : on ne réécrit que
          # lorsque le gabarit lui-même a changé, et on laisse tranquille une
          # configuration déjà correcte.
          GABARIT_VERSION=$(sha256sum "$CONF_SRC_TMP" | cut -c1-12)

          if sudo grep -q "gabarit:$GABARIT_VERSION" "$CONF_DEST" 2>/dev/null; then
            echo "→ configuration nginx déjà à jour (gabarit $GABARIT_VERSION)"

          elif sudo grep -q "listen 443" "$CONF_DEST" 2>/dev/null; then
            # Configuration antérieure au marqueur, mais qui SERT DÉJÀ le site en
            # HTTPS. On l'adopte telle quelle au lieu de la réécrire : réécrire
            # une configuration qui fonctionne pour la rendre identique à un
            # gabarit sans SSL, c'est exactement ce qui a mis le site à terre.
            echo "# gabarit:$GABARIT_VERSION" | sudo tee -a "$CONF_DEST" > /dev/null
            echo "→ configuration existante adoptée (HTTPS déjà en place)"

          else
            # Sauvegarde AVANT d'écrire : un déploiement raté ne doit jamais
            # laisser le site dans un état pire qu'avant.
            SAUVEGARDE=/etc/nginx/sites-available/gextimo_frontend.conf.avant-deploiement
            sudo cp "$CONF_DEST" "$SAUVEGARDE" 2>/dev/null || true

            echo "# gabarit:$GABARIT_VERSION" | cat - "$CONF_SRC_TMP" > "$CONF_SRC_TMP.v"
            sudo cp "$CONF_SRC_TMP.v" "$CONF_DEST"
            echo "→ nginx frontend.conf réécrit (gabarit $GABARIT_VERSION)"
            REECRIT=1
          fi
          rm -f "$CONF_SRC_TMP" "$CONF_SRC_TMP.v"

          if [ ! -L "$CONF_LINK" ]; then
            sudo ln -sf "$CONF_DEST" "$CONF_LINK"
            echo "→ site activé"
          fi

          mkdir -p /var/www/gextimo_frontend

          if sudo nginx -t 2>/dev/null; then
            sudo systemctl reload nginx
            echo "✓ nginx rechargé"
          else
            sudo nginx -t; exit 1
          fi

          # ⚠️ La configuration écrite plus haut n'écoute QU'EN HTTP. Le bloc 443
          # est ajouté par certbot, et il est donc EFFACÉ à chaque réécriture.
          #
          # La condition d'origine — « ne rien faire si le certificat existe » —
          # partait du principe que certbot ne sert qu'à l'émission. C'est faux :
          # il sert aussi à INSTALLER le certificat dans nginx. Résultat, le
          # 20/07 : configuration réécrite, bloc 443 perdu, certbot sauté, plus
          # rien n'écoutait en HTTPS pour le domaine — nginx retombait sur le
          # site par défaut (l'API) et servait SON certificat. Site inaccessible.
          #
          # On appelle donc certbot À CHAQUE déploiement. L'opération est
          # idempotente et ne consomme aucun quota Let's Encrypt quand le
          # certificat est encore valide : il est simplement redéployé.
          if command -v certbot > /dev/null; then
            echo "→ Installation du certificat dans nginx…"
            sudo timeout 180 certbot --nginx -d "$DOMAIN" --non-interactive --agree-tos -m dev.djraaa@gmail.com --redirect \
              || echo "⚠️  certbot n'a pas abouti — le site reste servi en HTTP, à reprendre"
          else
            echo "⏭️  certbot absent — le site ne sera servi qu'en HTTP"
          fi

          # Garde-fou : on vérifie que le domaine écoute RÉELLEMENT en 443 avant
          # de déclarer le déploiement réussi. Sans ce contrôle, la panne du
          # 20/07 est passée inaperçue jusqu'à ce qu'un humain ouvre le site.
          if ! sudo grep -q "listen 443" "$CONF_DEST"; then
            echo "❌ Aucune écoute HTTPS pour $DOMAIN."

            # On REMET la configuration précédente, qui elle fonctionnait. Le
            # premier garde-fou se contentait d'échouer : il rendait la panne
            # visible, mais laissait le site inaccessible — c'est-à-dire le pire
            # des deux mondes.
            if [ "${REECRIT:-0}" = "1" ] && [ -f "$SAUVEGARDE" ]; then
              sudo cp "$SAUVEGARDE" "$CONF_DEST"
              sudo nginx -t && sudo systemctl reload nginx
              echo "↩️  Configuration précédente restaurée — le site reste en ligne."
            fi

            exit 1
          fi

          # Contrôle final : le domaine doit RÉPONDRE, pas seulement être
          # configuré. C'est ce qui manquait le 20/07 — tout paraissait vert et
          # le site était injoignable.
          CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "https://$DOMAIN/" || echo 000)
          if [ "$CODE" = "000" ]; then
            echo "❌ https://$DOMAIN ne répond pas (code $CODE)."
            exit 1
          fi
          echo "✅ HTTPS en place — https://$DOMAIN répond ($CODE)"
          ENGNX

      - name: Deploy dist to VPS
        timeout-minutes: 6
        run: |
          # --exclude APK : les Gextimo*.apk sont déposés par release.sh (hors dist/) —
          # sans cet exclude, --delete les efface à CHAQUE déploiement du site et le
          # bouton « Télécharger » / la MAJ in-app servent du HTML (vu en prod le 16/07).
          # Réessai : la connexion SSH depuis les runners GitHub tombe par
          # intermittence (2 déploiements perdus sur 8 le 20/07). Sans cela un
          # push part vert côté git alors que le code n'est jamais mis en ligne.
          for essai in 1 2 3; do
            rsync -az --delete \
              --exclude='Gextimo*.apk' \
              --chmod=D755,F644 \
              -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectionAttempts=5 -o ConnectTimeout=45 -o ServerAliveInterval=15 -o ServerAliveCountMax=4" \
              ./dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/gextimo_frontend/ && break
            echo "::warning::rsync a échoué (tentative $essai/3) — nouvelle tentative dans 15 s"
            [ "$essai" = 3 ] && exit 1
            sleep 15
          done

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o ConnectionAttempts=5 \
              -o ConnectTimeout=45 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              -o BatchMode=yes \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "sudo systemctl reload nginx && echo '✅ Frontend déployé'"
