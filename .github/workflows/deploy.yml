name: Deploy Gextimo Frontend

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'android/**'
      - 'scripts/**'
      - 'assets/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # known_hosts best-effort : ne doit pas faire échouer le step (ssh/rsync utilisent StrictHostKeyChecking=no)
          ssh-keyscan -T 10 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy Nginx
        timeout-minutes: 5
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o ConnectionAttempts=5 \
              -o ConnectTimeout=45 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              -o BatchMode=yes \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENGNX'
          set -uo pipefail

          DOMAIN=gextimo.novafriq.africa
          RACINE=/var/www/gextimo_frontend
          CONF_DEST=/etc/nginx/sites-available/gextimo_frontend.conf
          CONF_LINK=/etc/nginx/sites-enabled/gextimo_frontend.conf
          LE=/etc/letsencrypt/live/$DOMAIN

          # ── Contrainte à connaître avant de toucher à ce fichier ───────────
          # L'utilisateur de déploiement n'a `sudo` que pour : nginx, certbot,
          # cp, ln, chown, systemctl reload. Ni grep, ni tee, ni test, ni
          # timeout. Employer autre chose fait réclamer un mot de passe qui ne
          # viendra jamais — l'étape échoue ou reste suspendue.
          # C'est ce qui a coupé le site en production le 20/07.

          # Lire un fichier root : on le recopie avec `cp`, seule voie permise.
          lire_root() {
            local tmp; tmp=$(mktemp)
            sudo cp "$1" "$tmp" 2>/dev/null || { rm -f "$tmp"; return 1; }
            sudo chown "$(id -u):$(id -g)" "$tmp" 2>/dev/null || true
            cat "$tmp"; rm -f "$tmp"
          }
          existe_root() { sudo cp "$1" /dev/null 2>/dev/null; }

          mkdir -p "$RACINE"

          # ── Le certificat est-il déjà émis ? ───────────────────────────────
          # Cette réponse décide de la forme du gabarit. On NE dépend plus de
          # certbot pour injecter le bloc 443 : le gabarit le contient lui-même,
          # et pointe vers les fichiers que certbot maintient. Renouvellement
          # compris — les chemins ne changent pas.
          if existe_root "$LE/fullchain.pem"; then
            AVEC_SSL=1
          else
            AVEC_SSL=0
            echo "→ Aucun certificat pour $DOMAIN : configuration HTTP le temps de l'émission."
          fi

          # ── Corps commun aux deux formes ───────────────────────────────────
          CORPS=$(cat << 'CORPSCONF'
              root /var/www/gextimo_frontend;
              index index.html;
              client_max_body_size 20M;
              location / { try_files $uri $uri/ /index.html; }
              # Fichiers hachés par Vite : réellement immuables → cache très long.
              location ^~ /assets/ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
                  access_log off;
              }
              # Service worker : jamais figé (doit pouvoir se mettre à jour).
              location = /sw.js { add_header Cache-Control "no-cache"; }
              # Pages HTML : JAMAIS en cache. index.html référence des fichiers
              # au nom haché ; servi depuis le cache après un déploiement, il
              # pointe vers des fichiers supprimés — écran blanc sans message.
              # Et le suivi, consulté par la direction, doit refléter l'état réel.
              location ~* \.html$ {
                  add_header Cache-Control "no-cache, must-revalidate";
                  expires -1;
              }
              # Statiques à URL STABLE dont le contenu change (favicon, icônes) :
              # cache court + revalidation. En « immutable » 1 an, un changement
              # de logo n'atteignait jamais les navigateurs (constaté le 19/07).
              location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|webmanifest)$ {
                  expires 1h;
                  add_header Cache-Control "public, max-age=3600, must-revalidate";
                  access_log off;
              }
              location ~* \.(woff|woff2|ttf|eot)$ {
                  expires 30d;
                  add_header Cache-Control "public";
                  access_log off;
              }
              location ~ /\.(?!well-known).* { deny all; }
              error_log  /var/log/nginx/gextimo_frontend_error.log;
              access_log /var/log/nginx/gextimo_frontend_access.log;
          CORPSCONF
          )

          CONF_TMP=$(mktemp)
          if [ "$AVEC_SSL" = "1" ]; then
            {
              echo "server {"
              echo "    server_name $DOMAIN;"
              echo "$CORPS"
              echo "    listen 443 ssl;"
              echo "    ssl_certificate $LE/fullchain.pem;"
              echo "    ssl_certificate_key $LE/privkey.pem;"
              echo "    include /etc/letsencrypt/options-ssl-nginx.conf;"
              echo "    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;"
              echo "}"
              echo "server {"
              echo "    listen 80;"
              echo "    server_name $DOMAIN;"
              echo "    return 301 https://\$host\$request_uri;"
              echo "}"
            } > "$CONF_TMP"
          else
            {
              echo "server {"
              echo "    listen 80;"
              echo "    server_name $DOMAIN;"
              echo "$CORPS"
              echo "}"
            } > "$CONF_TMP"
          fi

          # Le marqueur rend la comparaison fiable : le fichier en place peut
          # avoir été retouché par certbot, seul le gabarit compte.
          GABARIT=$(sha256sum "$CONF_TMP" | cut -c1-12)
          echo "# gabarit:$GABARIT" >> "$CONF_TMP"

          # ── Écriture, seulement si le gabarit a changé ─────────────────────
          REECRIT=0
          SAUVEGARDE="$CONF_DEST.avant-deploiement"

          if lire_root "$CONF_DEST" 2>/dev/null | grep -q "gabarit:$GABARIT"; then
            echo "→ Configuration déjà à jour (gabarit $GABARIT)."
          else
            sudo cp "$CONF_DEST" "$SAUVEGARDE" 2>/dev/null || true
            sudo cp "$CONF_TMP" "$CONF_DEST"
            REECRIT=1
            echo "→ Configuration réécrite (gabarit $GABARIT, ssl=$AVEC_SSL)."
          fi
          rm -f "$CONF_TMP"

          [ -L "$CONF_LINK" ] || sudo ln -sf "$CONF_DEST" "$CONF_LINK"

          # ── Validation, avec retour arrière ────────────────────────────────
          if ! sudo nginx -t 2>/dev/null; then
            echo "❌ Configuration nginx invalide :"
            sudo nginx -t
            if [ "$REECRIT" = "1" ]; then
              sudo cp "$SAUVEGARDE" "$CONF_DEST" && sudo systemctl reload nginx
              echo "↩️  Configuration précédente restaurée."
            fi
            exit 1
          fi
          sudo systemctl reload nginx

          # ── Émission du certificat si nécessaire ──────────────────────────
          # Uniquement à la première mise en place. Passé ce cap, le gabarit
          # porte lui-même le bloc 443 : plus rien à réinjecter, y compris
          # après renouvellement.
          if [ "$AVEC_SSL" = "0" ]; then
            if command -v certbot > /dev/null; then
              echo "→ Émission du certificat…"
              sudo certbot --nginx -d "$DOMAIN" --non-interactive --agree-tos \
                   -m dev.djraaa@gmail.com --redirect \
                || echo "⚠️  Émission non aboutie — le site reste servi en HTTP."
            else
              echo "⏭️  certbot absent — le site restera en HTTP."
            fi
          fi

          # ── Contrôle final : le site doit RÉPONDRE ────────────────────────
          # Pas « être configuré » : répondre. C'est ce qui manquait le 20/07,
          # où tout paraissait vert pendant que le site était injoignable.
          CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 25 "https://$DOMAIN/" || echo 000)
          if [ "$CODE" = "000" ]; then
            echo "❌ https://$DOMAIN ne répond pas."
            if [ "$REECRIT" = "1" ] && [ -f "$SAUVEGARDE" ]; then
              sudo cp "$SAUVEGARDE" "$CONF_DEST" && sudo nginx -t && sudo systemctl reload nginx
              echo "↩️  Configuration précédente restaurée — le site reste en ligne."
            fi
            exit 1
          fi
          echo "✅ https://$DOMAIN répond ($CODE)."
          ENGNX


      - name: Deploy dist to VPS
        timeout-minutes: 6
        run: |
          # --exclude APK : les Gextimo*.apk sont déposés par release.sh (hors dist/) —
          # sans cet exclude, --delete les efface à CHAQUE déploiement du site et le
          # bouton « Télécharger » / la MAJ in-app servent du HTML (vu en prod le 16/07).
          # Réessai : la connexion SSH depuis les runners GitHub tombe par
          # intermittence (2 déploiements perdus sur 8 le 20/07). Sans cela un
          # push part vert côté git alors que le code n'est jamais mis en ligne.
          for essai in 1 2 3; do
            rsync -az --delete \
              --exclude='Gextimo*.apk' \
              --chmod=D755,F644 \
              -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectionAttempts=5 -o ConnectTimeout=45 -o ServerAliveInterval=15 -o ServerAliveCountMax=4" \
              ./dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/gextimo_frontend/ && break
            echo "::warning::rsync a échoué (tentative $essai/3) — nouvelle tentative dans 15 s"
            [ "$essai" = 3 ] && exit 1
            sleep 15
          done

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              -o ConnectionAttempts=5 \
              -o ConnectTimeout=45 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              -o BatchMode=yes \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "sudo systemctl reload nginx && echo '✅ Frontend déployé'"
