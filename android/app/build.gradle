apply plugin: 'com.android.application'

android {
    namespace = "com.couturepro.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.couturepro.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 12
        versionName "1.0.11"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def kp = rootProject.file('keystore.properties')
            if (kp.exists()) {
                def props = new Properties()
                props.load(new FileInputStream(kp))
                storeFile rootProject.file(props['storeFile'])
                storePassword props['storePassword']
                keyAlias props['keyAlias']
                keyPassword props['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // Signature release si keystore.properties présent (sinon build debug non signé).
            signingConfig rootProject.file('keystore.properties').exists() ? signingConfigs.release : null
        }
    }

    // Deux applications distinctes depuis le même code :
    //  - gextimo : app des professionnels (Play Store)     → nom/icône dans src/gextimo/res
    //  - admin   : console interne réservée à l'équipe      → nom/icône dans src/admin/res
    flavorDimensions "cible"
    productFlavors {
        gextimo {
            dimension "cible"
            applicationId "com.couturepro.app"
        }
        admin {
            dimension "cible"
            // ⚠️ DEVRAIT être "com.couturepro.admin" — c'est toute la raison
            // d'être des deux saveurs : permettre à la console interne et à
            // l'app des pros de cohabiter sur un même appareil. En l'état,
            // installer l'admin REMPLACE l'app des professionnels.
            //
            // BLOQUÉ : google-services.json ne déclare que com.couturepro.app.
            // Avec l'identifiant distinct, le build échoue sur
            // processAdminDebugGoogleServices (« No matching client found »).
            // Les clés Firebase ne s'inventent pas.
            //
            // POUR DÉBLOQUER : enregistrer com.couturepro.admin comme
            // application Android dans la console Firebase du projet, puis
            // remplacer android/app/google-services.json par le fichier
            // régénéré (il contiendra alors les deux clients). Rétablir ensuite
            // la valeur ci-dessous.
            //
            // Historique : la valeur distincte a existé (5753299), a été effacée
            // par 2d81e27, puis réécrite à chaque build par le sed non ancré de
            // scripts/build-android.sh — lequel est corrigé, si bien que ce
            // fichier ne sera plus écrasé silencieusement.
            applicationId "com.couturepro.app"
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
