<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Gextimo">
  <!--
    Marque Gextimo réduite à son signe distinctif : l'anneau ouvert et le point
    qui entourent le « o » du logotype.

    L'ancien fichier était un glyphe VIOLET (#863bff) avec des flous, reste d'un
    gabarit et sans rapport avec la charte. Comme les navigateurs modernes
    préfèrent le SVG au .ico, c'est lui qui s'affichait dans les onglets — alors
    que les favicons PNG, eux, étaient déjà aux bonnes couleurs. Seul ce fichier
    jurait.

    Dessin volontairement massif : à 16 px, un trait fin disparaît.
  -->
  <circle cx="32" cy="32" r="31" fill="#FFFFFF"/>
  <path d="M32 6a26 26 0 1 0 26 26"
        fill="none" stroke="#D00B0B" stroke-width="8" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="10" fill="#D00B0B"/>
</svg>
