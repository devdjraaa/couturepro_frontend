# REL-2 / Pt 125 — Détection des robots pour le pré-rendu SEO de la vitrine.
# Les User-Agents de robots sont envoyés vers /api/seo/render (HTML sémantique
# complet par page) ; les navigateurs humains ne passent JAMAIS par là.
map $http_user_agent $gx_bot {
    default 0;
    ~*(googlebot|bingbot|duckduckbot|yandex(bot)?|baiduspider|applebot|petalbot) 1;
    ~*(facebookexternalhit|twitterbot|linkedinbot|whatsapp|telegrambot|slack(bot)?|discordbot|pinterest) 1;
    ~*(semrushbot|ahrefsbot|mj12bot|dotbot) 1;
}
