# ⚠️ MIROIR de /etc/nginx/sites-available/gextimo_frontend.conf (VPS), qui est
# la copie AUTORITAIRE (gérée par certbot — blocs SSL inclus). Le « Deploy
# Nginx » du CI ne peut PAS l'écraser : ses sudo échouent en silence (sudoers
# limité). Toute modification s'applique À LA MAIN sur le VPS puis se reporte
# ici. La map des robots vit dans /etc/nginx/conf.d/gextimo_bots_map.conf
# (miroir : deploy/nginx-bots-map.conf).
server {
    server_name gextimo.novafriq.africa;
    root /var/www/gextimo_frontend;
    index index.html;
    client_max_body_size 20M;
    location / {
        # REL-2 : les robots reçoivent un HTML pré-rendu par page (titre,
        # description, contenu réel) — la SPA vide ne leur montre rien.
        # error_page + return : la seule façon saine de brancher un « if » vers
        # une location nommée sans les pièges de if+try_files.
        error_page 418 = @gx_bots;
        if ($gx_bot) { return 418; }
        try_files $uri $uri/ /index.html;
    }

    # Pré-rendu SEO : proxy local vers l'API (SNI vers le vhost api).
    location @gx_bots {
        rewrite ^ /api/vitrine/seo/render break;
        proxy_pass https://127.0.0.1:443;
        proxy_set_header Host gextimoapi.novafriq.africa;
        proxy_set_header X-Original-Path $request_uri;
        proxy_ssl_server_name on;
        proxy_ssl_name gextimoapi.novafriq.africa;
    }
    # Assets hashés par Vite (/assets/) : réellement immuables → cache très long.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    # Service worker : jamais figé (doit pouvoir se mettre à jour).
    location = /sw.js { add_header Cache-Control "no-cache"; }
    # Statiques à URL STABLE dont le contenu change (favicon, icônes, manifest) :
    # cache court + revalidation. En « immutable » 1 an, un changement de logo
    # n'atteignait jamais les navigateurs (constaté le 19/07 : Edge et Chrome
    # affichaient deux anciens favicons différents, insensibles au rafraîchissement).
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|webmanifest)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        access_log off;
    }
    # Polices : longue durée acceptable.
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
    location ~ /\.(?!well-known).* { deny all; }
    error_log  /var/log/nginx/gextimo_frontend_error.log;
    access_log /var/log/nginx/gextimo_frontend_access.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gextimo.novafriq.africa/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gextimo.novafriq.africa/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = gextimo.novafriq.africa) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name gextimo.novafriq.africa;
    return 404; # managed by Certbot


}