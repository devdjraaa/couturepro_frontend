server {
    listen 80;
    server_name gextimo.novafriq.africa;
    root /var/www/gextimo_frontend;
    index index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_log  /var/log/nginx/gextimo_frontend_error.log;
    access_log /var/log/nginx/gextimo_frontend_access.log;
}
