server {
    listen 80;
    server_name gextimo.novafriq.africa;
    root /var/www/gextimo_frontend;
    index index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets hashés par Vite (/assets/) : réellement immuables → cache très long.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service worker : jamais figé (doit pouvoir se mettre à jour).
    location = /sw.js { add_header Cache-Control "no-cache"; }

    # Statiques à URL STABLE dont le contenu change (favicon, icônes, og, manifest) :
    # cache court + revalidation pour propager vite les mises à jour (logo, etc.).
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|webmanifest)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        access_log off;
    }

    # Polices : longue durée acceptable.
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_log  /var/log/nginx/gextimo_frontend_error.log;
    access_log /var/log/nginx/gextimo_frontend_access.log;
}
